<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIM — 利他共好｜內外聯動</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #FDF6EE;
      --surface:      #FFFFFF;
      --surface2:     #E8F5E9;
      --border:       rgba(76,175,80,0.25);
      --border2:      rgba(76,175,80,0.35);

      --accent:       #4CAF50;
      --accent-dark:  #2E7D32;
      --accent-light: #E8F5E9;

      --warm1-light:  #E8F5E9;
      --warm1-text:   #1B5E20;
      --warm2-light:  #F1F8E9;
      --warm2-text:   #33691E;
      --warm3-light:  #F9FBE7;
      --warm3-text:   #558B2F;

      --text:         #1B3A1F;
      --text2:        #2E5E34;
      --text3:        #5A8A60;

      --header-bg:    #F0FAF0;

      --radius-md:    8px;
      --radius-lg:    14px;
      --radius-pill:  100px;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #F2F9F2;
      color: var(--text);
      min-height: 100vh;
    }

    /* ══ HEADER ══ */
    header {
      background: linear-gradient(135deg, #F0FAF0 0%, #E8F5E9 100%);
      border-bottom: 1.5px solid rgba(60,160,70,0.3);
      box-shadow: 0 2px 10px rgba(40,120,50,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .logo-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    /* ★ 移除 text-transform，直接顯示中文，加深顏色 */
    .logo-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sync-status {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
    }

    /* 重新整理按鈕 */
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      color: var(--text2);
      background: var(--surface);
      border: 1px solid rgba(60,140,70,0.25);
      border-radius: var(--radius-pill);
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, border-color .15s;
    }
    .refresh-btn:hover { background: var(--surface2); border-color: #4CAF50; }
    .refresh-btn svg   { width: 13px; height: 13px; stroke: currentColor; fill: none; flex-shrink: 0; }
    .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 試算表按鈕 */
    .sheet-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      color: #2E7D32;
      background: #E8F5E9;
      border: 1px solid rgba(60,160,70,0.4);
      border-radius: var(--radius-pill);
      padding: 6px 16px;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s, border-color .15s;
    }
    .sheet-btn:hover { background: #b2dfdb; border-color: #4CAF50; }
    .sheet-btn svg   { width: 14px; height: 14px; flex-shrink: 0; }

    /* ══ HERO ══ */
    .hero {
      background: linear-gradient(180deg, #F0FAF0 0%, #E8F5E9 50%, #C8E6C9 100%);
      border-bottom: 1px solid rgba(100,170,100,0.2);
      padding: 1.2rem 2rem 1rem;
      position: relative;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .hero-inner {
      position: relative;
      z-index: 1;
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

    /* 雲朵飄動 */
    .cloud {
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes floatL { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-18px)} }
    @keyframes floatR { 0%,100%{transform:translateX(0)} 50%{transform:translateX(16px)} }
    @keyframes floatS { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-10px)} }
    .cloud-1 { animation: floatR 7s ease-in-out infinite; }
    .cloud-2 { animation: floatL 9s ease-in-out infinite; }
    .cloud-3 { animation: floatR 11s ease-in-out infinite; }
    .cloud-4 { animation: floatS 6s ease-in-out infinite; }
    .hero h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 30px;
      font-weight: 600;
      color: #1A3D1F;
      line-height: 1.4;
      margin-bottom: .65rem;
      text-shadow: 0 0 12px rgba(255,255,255,0.95), 0 0 6px rgba(255,255,255,0.9), 0 1px 0 rgba(255,255,255,0.8);
    }
    .hero-sub { font-size: 14px; color: #1A3D1F; font-weight: 500; line-height: 1.85; text-shadow: 0 0 10px rgba(255,255,255,0.95), 0 0 5px rgba(255,255,255,0.9); }

    /* ══ ERROR BANNER ══ */
    .error-banner {
      display: none;
      max-width: 1100px;
      margin: 1rem auto 0;
      padding: .75rem 2rem;
      background: #FFF8E1;
      border: 0.5px solid rgba(251,192,45,0.5);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: #F57F17;
    }
    .error-banner.show { display: block; }

    /* ══ TICKER ══ */
    .ticker-wrap {
      background: rgba(255,255,255,0.82);
      border-bottom: 1px solid rgba(76,175,80,0.18);
      height: 34px;
      position: sticky;
      top: 48px;
      z-index: 99;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .ticker-mascot {
      flex-shrink: 0;
      width: 48px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border-right: 1px solid rgba(76,175,80,0.15);
      overflow: hidden;
    }
    .ticker-text {
      flex: 1;
      height: 34px;
      overflow: hidden;
      position: relative;
    }
    .ticker-slot {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #2E7D32;
      font-weight: 400;
      letter-spacing: .06em;
      padding: 0 2rem;
      text-align: center;
    }
    @keyframes slideInUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes slideOutUp {
      from { transform: translateY(0);    opacity: 1; }
      to   { transform: translateY(-100%); opacity: 0; }
    }
    .ticker-slot.enter { animation: slideInUp  .5s ease forwards; }
    .ticker-slot.leave { animation: slideOutUp .5s ease forwards; }

    /* ══ FILTER BAR ══ */
    .controls-bar {
      background: var(--surface);
      border-bottom: 1px solid rgba(100,170,100,0.2);
      padding: .9rem 2rem;
    }
    .controls-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .filter-btn {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      padding: 5px 16px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(60,140,70,0.25);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { background: var(--surface2); }
    .filter-btn.active {
      background: #4CAF50;
      border-color: #4CAF50;
      color: #fff;
    }

    /* ══ STATS ══ */
    .stats-area {
      max-width: 1100px;
      margin: 1.5rem auto 0;
      padding: 0 2rem;
      display: flex;
      gap: 1rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid rgba(76,175,80,0.35);
      border-radius: var(--radius-md);
      padding: .9rem 1.25rem;
      flex: 1;
      transition: box-shadow .15s;
    }
    .stat:hover { box-shadow: 0 2px 12px rgba(40,120,50,0.07); }
    .stat-n { font-size: 28px; font-weight: 500; color: #2E7D32; }
    .stat-l { font-size: 11px; color: var(--text3); margin-top: 3px; }

    /* ══ GRID ══ */
    .grid {
      max-width: 1100px;
      margin: 1.5rem auto 3rem;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    /* ══ CARD ══ */
    .card {
      background: var(--surface);
      border: 1px solid rgba(60,140,70,0.25);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .card:hover {
      border-color: rgba(76,175,80,0.6);
      box-shadow: 0 4px 20px rgba(40,120,50,0.08);
      transform: translateY(-2px);
    }
    .card-body {
      padding: 1.3rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-top  { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-top-left { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-date { font-size: 11px; color: var(--text3); }
    .card-source {
      font-size: 10px; padding: 2px 8px;
      border-radius: 4px; background: #FFFDE7; color: #F57F17; border: 0.5px solid rgba(245,127,23,0.25);
    }
    .card-tag {
      font-size: 10px; padding: 3px 10px;
      border-radius: var(--radius-pill); font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
    }
    .tag-趨勢新聞 { background: #E3F2FD; color: #0D47A1; border: 0.5px solid rgba(13,71,161,0.2); }
    .tag-ESG永續  { background: #FFF0F5; color: #C2185B; border: 0.5px solid rgba(194,24,91,0.15); }
    .tag-團隊共識 { background: #FFF3E0; color: #E65100; border: 0.5px solid rgba(230,81,0,0.2); }
    .tag-default  { background: #F3E5F5; color: #6A1B9A; border: 0.5px solid rgba(106,27,154,0.2); }
    .tag-AI觀念   { background: #F3E5F5; color: #6A1B9A; border: 0.5px solid rgba(106,27,154,0.2); }

    .card-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px; font-weight: 600;
      color: var(--text); line-height: 1.6;
    }
    .card-desc { font-size: 12px; color: var(--text2); line-height: 1.8; flex: 1; }
    .card-actions {
      display: flex; align-items: center; gap: 10px;
      padding: .6rem 0 0; border-top: 0.5px solid var(--border2);
      margin-top: auto; flex-wrap: wrap;
    }
    .card-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: #388E3C; text-decoration: none;
      transition: color .15s;
    }
    .card-link:hover { color: #1B5E20; }
    .card-link svg { width: 12px; height: 12px; stroke: currentColor; fill: none; }
    .card-link.data {
      font-size: 11px; color: var(--warm3-text);
      background: #E8F5E9; border: 0.5px solid rgba(76,175,80,0.4);
      border-radius: var(--radius-pill); padding: 3px 10px;
    }
    .card-link.data:hover { background: #f5e8c8; color: #4a3008; }
    }
    .msg {
      grid-column: 1/-1; padding: 3rem;
      text-align: center; color: var(--text3); font-size: 14px;
    }

    /* ══ RWD ══ */
    @media (max-width: 640px) {
      .header-inner { padding: 0 1rem; }
      .sync-status  { display: none; }
      .hero         { padding: 1.5rem 1rem 1.2rem; }
      .hero h1      { font-size: 22px; }
      .controls-bar { padding: .75rem 1rem; }
      .stats-area   { padding: 0 1rem; gap: .5rem; }
      .grid         { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header>
    <div class="header-inner">
      <div class="logo-group">
        <div class="logo-dot"></div>
        <span class="logo-text">FIM — 利他共好｜內外聯動</span>
      </div>
      <div class="header-right">
        <span class="sync-status" id="sync-status">讀取中…</span>

        <!-- 重新整理按鈕 -->
        <button class="refresh-btn" id="refresh-btn" onclick="triggerRefresh()">
          <svg viewBox="0 0 16 16" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 8A5.5 5.5 0 1 1 10 3.07"/>
            <polyline points="10 1 10 4 13 4"/>
          </svg>
          重新整理
        </button>

        <!-- 試算表連結 -->
        <a class="sheet-btn"
           href="https://docs.google.com/spreadsheets/d/1a1XpArj0h3YU5nD-UndV2bW0eSQSioCpAkrvaC8RCCw/edit"
           target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="2" fill="#E8845A" opacity=".18"/>
            <rect x="3" y="3" width="18" height="18" rx="2" stroke="#E8845A" stroke-width="1.2"/>
            <line x1="3"  y1="9"  x2="21" y2="9"  stroke="#E8845A" stroke-width="1"/>
            <line x1="3"  y1="14" x2="21" y2="14" stroke="#E8845A" stroke-width="1"/>
            <line x1="9"  y1="3"  x2="9"  y2="21" stroke="#E8845A" stroke-width="1"/>
          </svg>
          開啟試算表
        </a>
      </div>
    </div>
  </header>

  <!-- ══ MARQUEE ══ -->
  <div class="ticker-wrap">
    <div class="ticker-mascot">
      <svg width="46" height="30" viewBox="0 0 72 40" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- 手電筒光束：白偏綠 -->
          <linearGradient id="bm" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#CCFF90" stop-opacity="0.95"/>
            <stop offset="65%"  stop-color="#CCFF90" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#CCFF90" stop-opacity="0"/>
          </linearGradient>
          <radialGradient id="lg" cx="35%" cy="50%" r="65%">
            <stop offset="0%"   stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#B9F6CA" stop-opacity="0.7"/>
          </radialGradient>
        </defs>

        <!-- 光束扇形 -->
        <polygon points="41,19  58,5  72,5  72,33  58,33" fill="url(#bm)"/>
        <polygon points="41,19  60,15  72,17  72,23  60,25" fill="#FFFFFF" opacity="0.3"/>
        <line x1="41" y1="19" x2="72" y2="5"  stroke="#B2FF59" stroke-width="0.8" opacity="0.6"/>
        <line x1="41" y1="19" x2="72" y2="33" stroke="#B2FF59" stroke-width="0.8" opacity="0.6"/>

        <!-- 頭髮（深棕，中性）-->
        <ellipse cx="13" cy="5"  rx="8"   ry="3.5" fill="#5D4037"/>
        <ellipse cx="6"  cy="10" rx="3"   ry="4.5" fill="#5D4037"/>
        <!-- 頭（自然膚色）-->
        <circle  cx="13" cy="14" r="9"             fill="#FFF9C4"/>
        <!-- 眼睛 -->
        <circle  cx="17" cy="12" r="1.6"           fill="#3E2723"/>
        <circle  cx="17.7" cy="11.3" r="0.6"       fill="white"/>
        <!-- 腮紅 -->
        <ellipse cx="19.5" cy="16" rx="2" ry="1.3" fill="#EF9A9A" opacity="0.6"/>
        <!-- 微笑 -->
        <path d="M11 18 Q15 21.5 19 18" stroke="#4E342E" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <!-- 身體（綠色衣服）-->
        <ellipse cx="13" cy="31" rx="8"   ry="7"   fill="#66BB6A"/>
        <!-- 左手 -->
        <line x1="6"  y1="27" x2="2"  y2="32" stroke="#4CAF50" stroke-width="2.8" stroke-linecap="round"/>
        <circle cx="1.5" cy="33" r="2.2"           fill="#FFF9C4"/>
        <!-- 右手 -->
        <line x1="21" y1="25" x2="30" y2="18" stroke="#4CAF50" stroke-width="2.8" stroke-linecap="round"/>
        <circle cx="30.5" cy="17.5" r="2"          fill="#FFF9C4"/>
        <!-- 手電筒筒身（深綠）-->
        <rect x="30" y="15" width="12" height="7" rx="2.5" fill="#2E7D32"/>
        <!-- 手電筒頭 -->
        <rect x="41" y="12" width="5"  height="13" rx="2" fill="#1B5E20"/>
        <!-- 鏡片 -->
        <ellipse cx="46" cy="18.5" rx="2.2" ry="5.5" fill="url(#lg)"/>
        <!-- 按鈕（亮綠）-->
        <circle cx="36" cy="18.5" r="1.4"           fill="#B2FF59"/>
        <circle cx="36" cy="18.5" r="0.7"           fill="#FFFFFF"/>
      </svg>
    </div>
    <div class="ticker-text" id="ticker-wrap"></div>
  </div>

  <!-- ══ HERO ══ -->
  <section class="hero">
    <!-- 療癒背景 SVG -->
    <svg class="hero-bg" viewBox="0 0 1100 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#F0FAF0"/>
          <stop offset="100%" stop-color="#C8E6C9"/>
        </linearGradient>
        <clipPath id="heroClip">
          <rect width="1100" height="200"/>
        </clipPath>
      </defs>
      <g clip-path="url(#heroClip)">

        <!-- 天空底色 -->
        <rect width="1100" height="200" fill="url(#skyGrad)"/>

        <!-- 遠山層 1（最遠、最淡、藍灰綠）-->
        <path d="M-10 130 Q80 75 200 105 Q330 138 430 85 Q530 35 650 78 Q770 118 870 65 Q970 15 1110 55 L1110 200 L-10 200Z"
              fill="#B2DFDB" opacity="0.45"/>

        <!-- 遠山層 2（中遠、柔綠）-->
        <path d="M-10 152 Q60 108 165 128 Q290 152 385 112 Q482 72 582 108 Q682 144 805 102 Q905 65 1005 98 Q1060 118 1110 94 L1110 200 L-10 200Z"
              fill="#A5D6A7" opacity="0.6"/>

        <!-- 中景草坡（飽和嫩綠）-->
        <path d="M-10 170 Q105 142 225 158 Q368 176 465 144 Q562 114 685 146 Q808 178 906 144 Q985 120 1110 148 L1110 200 L-10 200Z"
              fill="#81C784" opacity="0.75"/>

        <!-- 近景草地（最深最前）-->
        <path d="M-10 186 Q125 168 285 180 Q448 192 585 172 Q722 152 862 172 Q985 190 1110 170 L1110 200 L-10 200Z"
              fill="#4CAF50" opacity="0.85"/>

        <!-- 草地底色 -->
        <rect x="-10" y="194" width="1120" height="8" fill="#43A047" opacity="0.9"/>

        <!-- 風力發電機（左中景）-->
        <g transform="translate(185,115)" opacity="0.7">
          <line x1="0" y1="0" x2="0" y2="58" stroke="#90A4AE" stroke-width="2.5"/>
          <circle cx="0" cy="0" r="3" fill="#78909C"/>
          <line x1="0" y1="0" x2="0" y2="-24" stroke="#90A4AE" stroke-width="2"/>
          <line x1="0" y1="0" x2="21" y2="12" stroke="#90A4AE" stroke-width="2"/>
          <line x1="0" y1="0" x2="-21" y2="12" stroke="#90A4AE" stroke-width="2"/>
        </g>
        <g transform="translate(245,103)" opacity="0.55">
          <line x1="0" y1="0" x2="0" y2="65" stroke="#90A4AE" stroke-width="2.2"/>
          <circle cx="0" cy="0" r="2.5" fill="#78909C"/>
          <line x1="0" y1="0" x2="0" y2="-20" stroke="#90A4AE" stroke-width="1.8"/>
          <line x1="0" y1="0" x2="17" y2="10" stroke="#90A4AE" stroke-width="1.8"/>
          <line x1="0" y1="0" x2="-17" y2="10" stroke="#90A4AE" stroke-width="1.8"/>
        </g>
        <g transform="translate(760,98)" opacity="0.6">
          <line x1="0" y1="0" x2="0" y2="68" stroke="#90A4AE" stroke-width="2.5"/>
          <circle cx="0" cy="0" r="3" fill="#78909C"/>

  <div class="error-banner" id="error-banner">
    ⚠️ 無法從 Google Sheets 讀取資料。請確認試算表已設為「知道連結的人可以檢視」，目前顯示備用資料。

  <!-- ══ FILTERS ══ -->
  <div class="controls-bar">
    <div class="controls-inner" id="filter-row">
      <button class="filter-btn active" data-type="all">全部</button>
    </div>

  <!-- ══ STATS ══ -->
  <div class="stats-area" id="stats-row"></div>

  <!-- ══ GRID ══ -->
  <div class="grid" id="grid"><div class="msg">資料載入中…</div></div>

  <script>
    /* ── 試算表設定 ──
       欄位（第 1 列標題，第 2 列起為資料）：
       A 上線日期 | B 主題類型 | C 影片名稱
       D 摘要介紹 | E 影片連結 | F 內容來源  */
    const SHEET_ID = '1a1XpArj0h3YU5nD-UndV2bW0eSQSioCpAkrvaC8RCCw';
    const GID      = '0';
    const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

    const FALLBACK = [
      { date:'2026/04/19', type:'趨勢新聞', title:'低軌衛星成為AI基礎建設關鍵拼圖',             desc:'世界行動通訊大會揭密AI如何重塑5G、6G與衛星通訊版圖，帶你看見產業新機會與普萊德新布局！',                                          url:'https://notebooklm.google.com/notebook/7b632208-63a5-46a1-ab4d-1214cfc324ad/artifact/ede2d1fd-2d1a-46d7-b4a9-6b7d0433ffa3', dataUrl:'', source:'天下創新學院-天下零時差' },
      { date:'2026/04/01', type:'ESG永續',  title:'AI 啟航，共融未來：普萊德科技的永續轉型之路', desc:'2026年第1季永續季刊說明，普萊德科技以 AI 為共考夥伴推動轉型，結合自然正向行動與長期社會陪伴，攜手夥伴共創韌性未來',           url:'https://notebooklm.google.com/notebook/b467671b-ac33-4cad-9b87-a96b4cc5f7a9?artifactId=7d0e71f9-caea-4304-8dc2-5f74444d4b67', dataUrl:'', source:'2026Q1永續季刊' },
      { date:'2025/12/15', type:'團隊共識', title:'114年年終檢討結語',  desc:'CFO期許大家，面對外部快速變化，秉持以不變應萬變，穩健前行、靈活應對。',                     url:'https://youtu.be/4Mp5y7onfYg', dataUrl:'', source:'FIM自製' },
      { date:'2025/07/14', type:'團隊共識', title:'114年年中檢討開場',  desc:'2025 AI爆發成長，期中檢討將由AI小可愛開場登場，敬請期待！',                              url:'https://youtu.be/5f0s66xCoqA', dataUrl:'', source:'FIM自製' },
      { date:'2025/07/14', type:'團隊共識', title:'114年年中檢討結語',  desc:'2025年中檢討圓滿落幕，AI小可愛暖心總結並展望未來！',                                   url:'https://youtu.be/7MHnZDzGCMA', dataUrl:'', source:'FIM自製' },
      { date:'2025/07/14', type:'團隊共識', title:'114年年終檢討開場',  desc:'陳先生於AI策略共識營表示，AI是組織與每位同仁成長轉型的黃金機會，期許2026持續成長！',          url:'https://youtu.be/zP1AncMNfK4', dataUrl:'', source:'PLANET AI策略共識營' },
    ];

    /* ── CSV 解析 ── */
    function splitCSVLine(line) {
      const res = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; continue; }
        if (c === ',' && !inQ) { res.push(cur); cur = ''; continue; }
        cur += c;
      }
      res.push(cur); return res;
    }
    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      const rows  = [];
      for (let i = 1; i < lines.length; i++) {
        const c = splitCSVLine(lines[i]);
        if (c.length < 3) continue;
        const title = (c[2] || '').trim();
        if (!title) continue;
        rows.push({ date:(c[0]||'').trim(), type:(c[1]||'').trim(), title,
                    desc:(c[3]||'').trim(), url:(c[4]||'').trim(), dataUrl:(c[5]||'').trim(), source:(c[6]||'').trim() });
      }
      return rows;
    }

    /* ── 工具 ── */
    function toDate(s) {
      const p = s.replace(/\./g,'/').split('/');
      return p.length===3 ? new Date(+p[0],+p[1]-1,+p[2]) : new Date(0);
    }
    function fmtDate(s) { return s.replace(/\//g,'.'); }
    function pad(n)     { return String(n).padStart(2,'0'); }
    function nowStr()   { const n=new Date(); return `上次同步 ${pad(n.getHours())}:${pad(n.getMinutes())}`; }

    const $el       = id => document.getElementById(id);
    const setStatus = m  => $el('sync-status').textContent = m;
    const showErr   = () => $el('error-banner').classList.add('show');
    const hideErr   = () => $el('error-banner').classList.remove('show');

    /* ── 近一個月計算 ── */
    function countRecent(rows) {
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - 1);
      return rows.filter(r => toDate(r.date) >= cutoff).length;
    }

    /* ── 渲染統計（隨篩選同步）── */
    function renderStats(data, filter) {
      const rows = filter === 'all' ? data : data.filter(r => r.type === filter);
      $el('stats-row').innerHTML = [
        { n: rows.length,        l: '影片總數' },
        { n: countRecent(rows),  l: '近期上架（30天內）' },
      ].map(s => `<div class="stat"><div class="stat-n">${s.n}</div><div class="stat-l">${s.l}</div></div>`).join('');
    }

    /* ── 渲染卡片（由新到舊）── */
    function renderCards(data, filter) {
      let rows = filter === 'all' ? [...data] : data.filter(r => r.type === filter);
      rows.sort((a,b) => toDate(b.date) - toDate(a.date));
      if (!rows.length) { $el('grid').innerHTML = '<div class="msg">此分類目前沒有內容</div>'; return; }
      const known = ['趨勢新聞','ESG永續','團隊共識'];
      $el('grid').innerHTML = rows.map(r => {
        const tagCls = known.includes(r.type) ? `tag-${r.type}` : 'tag-default';
        return `<div class="card"><div class="card-body">
          <div class="card-top">
            <div class="card-top-left">
              <div class="card-meta">
                <span class="card-date">${fmtDate(r.date)}</span>
                ${r.source ? `<span class="card-source">${r.source}</span>` : ''}
              </div>
              <div class="card-title">${r.title}</div>
            </div>
            ${r.type ? `<span class="card-tag ${tagCls}">${r.type}</span>` : ''}
          </div>
          ${r.desc ? `<div class="card-desc">${r.desc}</div>` : ''}
          ${(r.url || r.dataUrl) ? `<div class="card-actions">
            ${r.url ? `<a class="card-link" href="${r.url}" target="_blank" rel="noopener">開啟影片
              <svg viewBox="0 0 12 12" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 2h3v3M10 2L5.5 6.5M2 4h3v6H2z"/>
              </svg></a>` : ''}
            ${r.dataUrl ? `<a class="card-link data" href="${r.dataUrl}" target="_blank" rel="noopener">資料來源</a>` : ''}
          </div>` : ''}
        </div></div>`;
      }).join('');
    }

    /* ── 動態篩選按鈕 ── */
    function buildFilters(data) {
      const types = [...new Set(data.map(r => r.type).filter(Boolean))];
      const row   = $el('filter-row');
      const cur   = row.querySelector('.filter-btn.active')?.dataset.type || 'all';
      row.innerHTML = '';
      ['all', ...types].forEach(t => {
        const btn = document.createElement('button');
        btn.className    = 'filter-btn' + (t === cur ? ' active' : '');
        btn.dataset.type = t;
        btn.textContent  = t === 'all' ? '全部' : t;
        row.appendChild(btn);
      });
    }

    /* ── 狀態 ── */
    let allData      = [];
    let activeFilter = 'all';
    let isLoading    = false;

    /* ── 垂直切換 Ticker ── */
    /* ── Ticker 從下往上切換 ── */
    const MESSAGES = [
      '企業文化：【誠信卓越、利他共好、創新永續】，以紀律為基石，是推動公司前進的力量！',
      '2026永續Slogan：共進迎變，鏈結韌性未來！',
      'Planet Slogan：Shaping Future Networking 數位創新 連結未來',
      'Planet 核心價值 — 永續發展 Sustainability；國際品牌 Global Brand；研發創新 Innovation',
      'Planet 願景：創建一個科技性、世界性的品牌，在國際上具有品牌影響力。',
      'Planet 使命：開發高品質、高附加價值的網路通訊傳輸設備，滿足全球客戶網路應用。共創經濟、社會、環境之 ESG 企業永續價值！',
      'CFO名言：以不變，應萬變！',
      'CFO名言：人要創造自己被利用的價值，為自己打造可信任的個人品牌。',
    ];
    (function initTicker() {
      const wrap = document.getElementById('ticker-wrap'); // ticker-text div
      if (!wrap) return;
      let cur = 0;
      let slot = document.createElement('div');
      slot.className = 'ticker-slot';
      slot.textContent = MESSAGES[0];
      wrap.appendChild(slot);
      setInterval(() => {
        cur = (cur + 1) % MESSAGES.length;
        const old = wrap.querySelector('.ticker-slot');
        if (old) { old.classList.add('leave'); setTimeout(() => old.remove(), 500); }
        const next = document.createElement('div');
        next.className = 'ticker-slot enter';
        next.textContent = MESSAGES[cur];
        wrap.appendChild(next);
      }, 4500);
    })();

    /* ── 主載入（時間戳 + no-store 避免 cache）── */
    async function loadData() {
      if (isLoading) return;
      isLoading = true;
      $el('refresh-btn').classList.add('spinning');
      hideErr(); setStatus('同步中…');
      try {
        const res = await fetch(CSV_URL + '&t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const parsed = parseCSV(await res.text());
        if (!parsed.length) throw new Error('empty');
        allData = parsed;
        setStatus(nowStr());
      } catch (e) {
        showErr();
        if (!allData.length) allData = FALLBACK;
        setStatus('同步失敗，顯示備用資料');
      }
      $el('refresh-btn').classList.remove('spinning');
      isLoading = false;
      buildFilters(allData);
      renderStats(allData, activeFilter);
      renderCards(allData, activeFilter);
    }

    /* ── 手動重新整理 ── */
    function triggerRefresh() { loadData(); }

    /* ── 篩選點擊（統計同步更新）── */
    $el('filter-row').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.type;
      renderStats(allData, activeFilter);
      renderCards(allData, activeFilter);
    });

    /* ── 啟動 + 每 5 分鐘自動同步 ── */



    loadData();
    setInterval(loadData, 5 * 60 * 1000);
  </script>
